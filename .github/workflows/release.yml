name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package USB release
        run: |
          cp usb/start.bat usb/start.sh usb/README.txt .
          zip -r lckr-usb.zip dist/ start.bat start.sh README.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lckr-usb.zip
          generate_release_notes: true
